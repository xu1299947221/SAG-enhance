services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sag_dev_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sag_lite}
      POSTGRES_USER: ${POSTGRES_USER:-sag_lite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sag_lite_pass}
    ports:
      - "${SAG_DEV_PG_BIND:-127.0.0.1}:${SAG_DEV_PG_PORT:-55432}:5432"
    volumes:
      - ${SAG_DEV_PG_DATA_DIR:-./data/dev-postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sag_lite} -d ${POSTGRES_DB:-sag_lite}"]
      interval: 5s
      timeout: 5s
      retries: 20
